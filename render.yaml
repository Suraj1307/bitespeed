services:
  - type: web
    name: bitespeed-identity
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run db:generate && npm run build && npm run db:migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-db
          property: connectionString

databases:
  - name: bitespeed-db
    plan: free
    region: oregon
